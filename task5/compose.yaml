services:
  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - PROCESSOR_ADDRESS=processor:8080
      - SUBSCRIBE_ADDRESS=subscribe:8080
    depends_on:
      - subscriber
      - processor
      - subscribe

  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28082:8080
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBE_ADDRESS=subscribe:8080
      - PROCESSOR_DATABASE_DSN=postgres://repo_stat:repo_stat@processor-postgres:5432/repo_stat_processor?sslmode=disable
      - PROCESSOR_MIGRATIONS_PATH=file:///migrations
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TASK_TOPIC=repository.collect.tasks
      - KAFKA_RESULT_TOPIC=repository.collect.results
      - KAFKA_RESULT_CONSUMER_GROUP=processor-results
    depends_on:
      processor-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      subscribe:
        condition: service_started

  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - SUBSCRIBE_ADDRESS=subscribe:8080
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TASK_TOPIC=repository.collect.tasks
      - KAFKA_RESULT_TOPIC=repository.collect.results
      - KAFKA_TASK_CONSUMER_GROUP=collector-tasks
    depends_on:
      kafka:
        condition: service_healthy
      subscribe:
        condition: service_started

  subscribe:
    image: subscribe:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscribe
    container_name: subscribe
    restart: unless-stopped
    ports:
      - 28084:8080
    volumes:
      - ./repo-stat/subscribe/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - DATABASE_DSN=postgres://repo_stat:repo_stat@postgres:5432/repo_stat?sslmode=disable
      - MIGRATIONS_PATH=file:///migrations
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - 25432:5432
    environment:
      - POSTGRES_USER=repo_stat
      - POSTGRES_PASSWORD=repo_stat
      - POSTGRES_DB=repo_stat
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_stat -d repo_stat"]
      interval: 5s
      timeout: 3s
      retries: 10

  processor-postgres:
    image: postgres:16-alpine
    container_name: processor-postgres
    restart: unless-stopped
    ports:
      - 25433:5432
    environment:
      - POSTGRES_USER=repo_stat
      - POSTGRES_PASSWORD=repo_stat
      - POSTGRES_DB=repo_stat_processor
    volumes:
      - processor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_stat -d repo_stat_processor"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - 29092:9092
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - API_ADDRESS=api:8080
  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: ["true"]

volumes:
  postgres-data:
  processor-postgres-data:
