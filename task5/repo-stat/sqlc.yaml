version: "2"
sql:
  - engine: "postgresql"
    schema: "subscribe/migrations"
    queries: "subscribe/internal/storage/query"
    gen:
      go:
        package: "db"
        out: "subscribe/internal/storage/db"
        sql_package: "pgx/v5"
  - engine: "postgresql"
    schema: "processor/migrations"
    queries: "processor/internal/storage/query"
    gen:
      go:
        package: "db"
        out: "processor/internal/storage/db"
        sql_package: "pgx/v5"
