services:
  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - PROCESSOR_ADDRESS=processor:8080
      - SUBSCRIBE_ADDRESS=subscribe:8080
    depends_on:
      - subscriber
      - processor
      - subscribe

  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28082:8080
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - COLLECTOR_ADDRESS=collector:8080
    depends_on:
      - collector

  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    ports:
      - 28083:8080
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBE_ADDRESS=subscribe:8080
    depends_on:
      - subscribe

  subscribe:
    image: subscribe:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscribe
    container_name: subscribe
    restart: unless-stopped
    ports:
      - 28084:8080
    volumes:
      - ./repo-stat/subscribe/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - DATABASE_DSN=postgres://repo_stat:repo_stat@postgres:5432/repo_stat?sslmode=disable
      - MIGRATIONS_PATH=file:///migrations
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - 25432:5432
    environment:
      - POSTGRES_USER=repo_stat
      - POSTGRES_PASSWORD=repo_stat
      - POSTGRES_DB=repo_stat
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_stat -d repo_stat"]
      interval: 5s
      timeout: 3s
      retries: 10

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - API_ADDRESS=api:8080
  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: ["true"]

volumes:
  postgres-data:
