syntax = "proto3";

package processor.v1;

option go_package = "repo-stat/proto/processor;processor";

service Processor {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetRepositoryInfo(GetRepositoryInfoRequest) returns (GetRepositoryInfoResponse);
}

message PingRequest {
}

message PingResponse {
  string reply = 1;
}

message GetRepositoryInfoRequest {
  string url = 1;
}

message GetRepositoryInfoResponse {
  string full_name = 1;
  string description = 2;
  int64 stars = 3;
  int64 forks = 4;
  string created_at = 5;
}
